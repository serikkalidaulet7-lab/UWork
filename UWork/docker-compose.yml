services:
  web:
    build: .
    container_name: project-silesia-web
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "*"
      DJANGO_SECRET_KEY: "change-me-before-public-deploy"
      SQLITE_PATH: "/app/data/db.sqlite3"
      DJANGO_SUPERUSER_USERNAME: "admin"
      DJANGO_SUPERUSER_PASSWORD: "Mawi0101pl"
      DJANGO_SUPERUSER_EMAIL: "admin@projectsilesia.local"
    volumes:
      - sqlite_data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=5)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  sqlite_data:
