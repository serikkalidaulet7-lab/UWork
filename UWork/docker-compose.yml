services:
  web:
    build: .
    container_name: uwork-future-ready-web
    ports:
      - "8000:8000"
    environment:
      DJANGO_ENV: "${DJANGO_ENV:-development}"
      DJANGO_DEBUG: "${DJANGO_DEBUG:-True}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-127.0.0.1,localhost}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-dev-only-secret-key-not-for-production}"
      SQLITE_PATH: "${SQLITE_PATH:-/app/data/db.sqlite3}"
      DJANGO_SUPERUSER_USERNAME: "${DJANGO_SUPERUSER_USERNAME:-}"
      DJANGO_SUPERUSER_PASSWORD: "${DJANGO_SUPERUSER_PASSWORD:-}"
      DJANGO_SUPERUSER_EMAIL: "${DJANGO_SUPERUSER_EMAIL:-}"
    volumes:
      - sqlite_data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=5)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  sqlite_data:
